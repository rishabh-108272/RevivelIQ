services:
  db:
    image: pgvector/pgvector:pg15
    container_name: reviveiq_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reviveiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reviveiq_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: reviveiq_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/reviveiq
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecret_revenue_recovery_key_replace_in_prod
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: ./backend
    container_name: reviveiq_celery
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/reviveiq
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecret_revenue_recovery_key_replace_in_prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: reviveiq_frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
